<!DOCTYPE html>
<html>
<head>
  <title>Cubing Tracker</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .buttons button {
      margin-left: 8px;
      padding: 6px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
    }

    .main {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .left, .right {
      flex: 1;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .session {
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
let username = "";
let sessions = [];
let routines = ["3x3 Full Solves"];

// --- XP ---
function calcXP(s) {
  let d = Number(s.duration) || 0;
  return s.routine.toLowerCase().includes("full solves") ? d : d * 1.5;
}

// --- Load user ---
function loadUser(user) {
  username = user;
  localStorage.setItem("cubingUsername", user);

  sessions = JSON.parse(localStorage.getItem("sessions_" + user)) || [];
  routines = JSON.parse(localStorage.getItem("routines_" + user)) || ["3x3 Full Solves"];

  render();
}

// --- Save ---
function save() {
  localStorage.setItem("sessions_" + username, JSON.stringify(sessions));
  localStorage.setItem("routines_" + username, JSON.stringify(routines));
}

// --- LOGIN SCREEN ---
function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="login">
      <h2>Enter Username</h2>
      <input id="nameInput" placeholder="Username"/>
      <button onclick="startLogin()">Start</button>
    </div>
  `;
}

function startLogin() {
  let name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  loadUser(name);
}

// --- ACTIONS ---
function logout() {
  if (!confirm("Are you sure you want to log out?")) return;

  username = "";
  render();
}

function deleteAccount() {
  if (!confirm("Delete account permanently?")) return;

  localStorage.removeItem("sessions_" + username);
  localStorage.removeItem("routines_" + username);
  localStorage.removeItem("cubingUsername");

  username = "";
  sessions = [];
  routines = ["3x3 Full Solves"];

  render();
}

function changeUsername() {
  let newName = prompt("New username:", username);
  if (!newName) return;

  newName = newName.trim();
  if (!newName || newName === username) return;

  // move data
  localStorage.setItem("sessions_" + newName, JSON.stringify(sessions));
  localStorage.setItem("routines_" + newName, JSON.stringify(routines));

  localStorage.removeItem("sessions_" + username);
  localStorage.removeItem("routines_" + username);

  username = newName;
  localStorage.setItem("cubingUsername", newName);

  render();
}

// --- ADD ---
function addRoutine() {
  let val = document.getElementById("newRoutine").value.trim();
  if (!val || routines.includes(val)) return;

  routines.push(val);
  save();
  render();
}

function addSession() {
  let dur = document.getElementById("duration").value;
  let routine = document.getElementById("routine").value;
  let notes = document.getElementById("notes").value;

  if (!dur) return;

  sessions.unshift({
    date: new Date().toLocaleDateString(),
    duration: dur,
    routine,
    notes
  });

  save();
  render();
}

// --- MAIN UI ---
function renderApp() {
  let totalXP = sessions.reduce((sum, s) => sum + calcXP(s), 0);

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="header">
        <h1>🧩 Cubing Tracker</h1>
        <div class="buttons">
          ${username}
          <button onclick="logout()">Logout</button>
          <button onclick="deleteAccount()">Delete</button>
          <button onclick="changeUsername()">Change</button>
        </div>
      </div>

      <h2>Total XP: ${totalXP}</h2>

      <div class="main">
        <div class="left">

          <div class="card">
            <h3>Routine</h3>
            <input id="newRoutine" placeholder="Add drill"/>
            <button onclick="addRoutine()">Add</button>
            <div>${routines.join(", ")}</div>
          </div>

          <div class="card">
            <h3>New Session</h3>
            <input id="duration" placeholder="Minutes"/>
            <select id="routine">
              ${routines.map(r => `<option>${r}</option>`).join("")}
            </select>
            <textarea id="notes" placeholder="Notes"></textarea>
            <button onclick="addSession()">Add Session</button>
          </div>

        </div>

        <div class="right">
          <h3>Sessions</h3>
          ${sessions.map(s => `
            <div class="session">
              <b>${s.date}</b> - ${s.duration} min<br>
              ${s.routine}<br>
              XP: ${calcXP(s)}<br>
              ${s.notes || ""}
            </div>
          `).join("")}
        </div>

      </div>
    </div>
  `;
}

// --- RENDER ---
function render() {
  if (!username) renderLogin();
  else renderApp();
}

// --- INIT ---
let savedUser = localStorage.getItem("cubingUsername");
if (savedUser) loadUser(savedUser);
else render();
</script>

</body>
</html>
